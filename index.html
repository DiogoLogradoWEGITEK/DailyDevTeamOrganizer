<!DOCTYPE html>
<html>
<head>
  <title>Daily Dev</title>
  <meta charset="UTF-8">
  <link rel="icon" type="image/x-icon" href="assets/favicon.ico" id="favicon">
  <script src="config.js"></script>
  <script src="config.example.js"></script>
  <script>
    (function () {
      var cfg = window.CONFIG || {};
      var hex = (cfg.primaryColor || '#0c3ff7').replace(/^#/, '');
      var r = parseInt(hex.slice(0, 2), 16);
      var g = parseInt(hex.slice(2, 4), 16);
      var b = parseInt(hex.slice(4, 6), 16);
      function mix(c, t, a) { return Math.round(c + (t - c) * a); }
      function toHex(r, g, b) { return '#' + [r, g, b].map(function (v) { return v.toString(16).padStart(2, '0'); }).join(''); }
      var root = document.documentElement;
      root.style.setProperty('--cp',      '#' + hex);
      root.style.setProperty('--cp-r',    r);
      root.style.setProperty('--cp-g',    g);
      root.style.setProperty('--cp-b',    b);
      root.style.setProperty('--cp-dark', toHex(mix(r, 0, 0.30), mix(g, 0, 0.30), mix(b, 0, 0.30)));
      root.style.setProperty('--cp-bg',   toHex(mix(r, 255, 0.94), mix(g, 255, 0.94), mix(b, 255, 0.94)));
      root.style.setProperty('--cp-hov',  toHex(mix(r, 255, 0.82), mix(g, 255, 0.82), mix(b, 255, 0.82)));
      if (cfg.faviconUrl) document.getElementById('favicon').href = cfg.faviconUrl;
    })();
  </script>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      background: var(--cp-bg);
      text-align: center;
      overflow: hidden;
    }

    body::before,
    body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      z-index: 0;
      pointer-events: none;
    }

    body::before {
      width: 60vw;
      height: 60vw;
      top: -20vw;
      left: -15vw;
      background: radial-gradient(circle, rgb(var(--cp-r) var(--cp-g) var(--cp-b) / 0.18) 0%, transparent 70%);
      filter: blur(40px);
    }

    body::after {
      width: 50vw;
      height: 50vw;
      bottom: -15vw;
      right: -10vw;
      background: radial-gradient(circle, rgb(var(--cp-r) var(--cp-g) var(--cp-b) / 0.13) 0%, transparent 70%);
      filter: blur(50px);
    }

    .blob-mid {
      position: fixed;
      width: 35vw;
      height: 35vw;
      top: 50%;
      left: 60%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: radial-gradient(circle, rgb(var(--cp-r) var(--cp-g) var(--cp-b) / 0.08) 0%, transparent 70%);
      filter: blur(35px);
      pointer-events: none;
      z-index: 0;
    }

    .timer, button, ul {
      position: relative;
      z-index: 1;
    }

    .timer {
      font-size: 4vh;
      font-weight: bold;
      margin-bottom: 2vh;
    }

    button {
      font-size: 2.5vh;
      padding: 1vh 2vh;
      margin-bottom: 2vh;
      cursor: pointer;
      border: 2px solid var(--cp);
      background: var(--cp);
      color: white;
      border-radius: 6px;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    }

    button:hover {
      background: var(--cp-dark);
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgb(var(--cp-r) var(--cp-g) var(--cp-b) / 0.45);
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
      font-size: 3.5vh;
    }

    li {
      margin: 1.2vh 0;
      padding: 1.2vh 2vh;
      background: #ffffff;
      border-radius: 10px;
      cursor: grab;
      border: none;
      border-left: 5px solid var(--cp);
      box-shadow: 0 2px 8px rgba(0,0,0,0.10);
      font-weight: 600;
      letter-spacing: 0.02em;
      color: #222;
      transition: background 0.15s, box-shadow 0.15s, transform 0.15s;
    }

    li:hover {
      background: var(--cp-hov);
      box-shadow: 0 6px 20px rgb(var(--cp-r) var(--cp-g) var(--cp-b) / 0.32);
      transform: translateX(4px);
    }

    li.dragging {
      opacity: 0.5;
    }

    .top-left-link {
      position: fixed;
      top: 24px;
      left: 24px;
      z-index: 1000;
      height: 32px;
      width: auto;
    }
  </style>
</head>
<body>

  <div class="blob-mid"></div>
  <img src="./assets/wedigitek.png" alt="Logo" class="top-left-link" id="logo">

  <div class="timer" id="timer">00:00</div>

  <button id="startBtn" onclick="startSession()"></button>
  <ul id="nameList" style="display:none;"></ul>

  <script src="participants.js"></script>
  <script src="participants.example.js"></script>
  <script>
    const TRANSLATIONS = {
      en: { startBtn: 'Presentation Order', reroll: 'Reroll' },
      pt: { startBtn: 'Ordem de Apresentação', reroll: 'Reembaralhar' }
    };
    const lang = navigator.language && navigator.language.startsWith('pt') ? 'pt' : 'en';
    const t = TRANSLATIONS[lang];

    // Apply logo URL from config
    const logoEl = document.getElementById('logo');
    if (window.CONFIG && window.CONFIG.logoUrl) logoEl.src = window.CONFIG.logoUrl;

    document.getElementById('startBtn').textContent = t.startBtn;

    const names = (window.PARTICIPANTS || []).slice();

    const listEl = document.getElementById("nameList");

    let seconds = 0;
    let timerInterval = null;

    function startTimer() {
      if (timerInterval) return;

      timerInterval = setInterval(() => {
        seconds++;
        const mins = String(Math.floor(seconds / 60)).padStart(2, '0');
        const secs = String(seconds % 60).padStart(2, '0');
        document.getElementById("timer").textContent = `${mins}:${secs}`;
      }, 1000);
    }

    function resetTimer() {
      clearInterval(timerInterval);
      timerInterval = null;
      seconds = 0;
      document.getElementById("timer").textContent = "00:00";
    }

    function displayNames(arr) {
      listEl.innerHTML = "";
      arr.forEach((name) => {
        const li = document.createElement("li");
        li.textContent = name;
        li.setAttribute("draggable", "true");
        addDragAndDropHandlers(li);
        listEl.appendChild(li);
      });
    }

    function addDragAndDropHandlers(item) {
      item.addEventListener("dragstart", () => {
        item.classList.add("dragging");
      });

      item.addEventListener("dragend", () => {
        item.classList.remove("dragging");
        updateArrayFromDOM();
      });

      item.addEventListener("dragover", (e) => {
        e.preventDefault();
        const dragging = document.querySelector(".dragging");
        if (!dragging || dragging === item) return;

        const rect = item.getBoundingClientRect();
        const offset = e.clientY - rect.top;

        if (offset > rect.height / 2) {
          item.after(dragging);
        } else {
          item.before(dragging);
        }
      });
    }

    function updateArrayFromDOM() {
      const items = document.querySelectorAll("#nameList li");
      names.length = 0;
      items.forEach(li => names.push(li.textContent));
    }

    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
    }

    function startSession() {
      shuffle(names);
      displayNames(names);
      listEl.style.display = "block";
      startTimer();
      document.getElementById("startBtn").textContent = t.reroll;
    }
  </script>

</body>
</html>
